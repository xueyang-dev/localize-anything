<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="520" height="220" fill="#0f172a" rx="8"/>

  <!-- Delivery directory -->
  <rect x="20" y="20" width="480" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="40" y="43" fill="#60a5fa" font-size="13px" font-weight="bold">deliveries/<run-id>/</text>

  <!-- Manifest -->
  <rect x="20" y="68" width="155" height="36" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="98" y="90" fill="#e2e8f0" font-size="10px" text-anchor="middle">delivery-manifest.json</text>

  <!-- Staging files -->
  <rect x="183" y="68" width="155" height="36" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="260" y="90" fill="#4ade80" font-size="10px" text-anchor="middle">res/values-<locale>/</text>

  <!-- Evidence -->
  <rect x="345" y="68" width="155" height="36" rx="4" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="423" y="90" fill="#fbbf24" font-size="10px" text-anchor="middle">evidence/</text>

  <!-- QA -->
  <rect x="20" y="114" width="120" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="80" y="133" fill="#94a3b8" font-size="9px" text-anchor="middle">qa-report.json</text>

  <rect x="146" y="114" width="120" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="206" y="133" fill="#94a3b8" font-size="9px" text-anchor="middle">batch-plan.json</text>

  <rect x="272" y="114" width="120" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="332" y="133" fill="#94a3b8" font-size="9px" text-anchor="middle">run-summary.json</text>

  <rect x="398" y="114" width="102" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="449" y="133" fill="#94a3b8" font-size="9px" text-anchor="middle">apply-plan.json</text>

  <!-- Annotations -->
  <text x="40" y="165" fill="#64748b" font-size="9px">Manifest: file inventory, checksums, base hashes</text>
  <text x="40" y="178" fill="#64748b" font-size="9px">Staging: rebuilt target-locale files (outside source tree)</text>
  <text x="40" y="191" fill="#64748b" font-size="9px">Evidence: QA items, run summary, apply plan, delivery decision</text>

  <!-- Safety note -->
  <text x="40" y="212" fill="#22c55e" font-size="8px">🔒 Source project is never touched. Apply requires explicit run-id confirmation.</text>
</svg>
