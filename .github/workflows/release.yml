name: release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish latest stable tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="$(git tag --merged HEAD --sort=-version:refname | head -n 1)"
          fi
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 0
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 && exit 0
          title="$(git for-each-ref --format='%(contents:subject)' "refs/tags/$tag")"
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "${title:-$tag}"
