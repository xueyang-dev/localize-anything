name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[yaml]"
      - run: python -m compileall -q runtime benchmarks
      - run: python -m runtime.localize_anything validate-protocol
      - run: python -m runtime.localize_anything validate-contracts
      - run: python -m unittest discover -s tests -v
      - name: Run regression benchmarks
        run: |
          python benchmarks/v022-android-resource-reliability/run.py
          python benchmarks/v022-android-resource-reliability/source_sets.py
          python benchmarks/v022-android-resource-reliability/risk_classification.py
          python benchmarks/v021-mode-system/run.py
